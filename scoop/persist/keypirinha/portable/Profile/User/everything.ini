[main]
enable_default_searches = yes

# Định dạng hiển thị kết quả
# {plugin_name}: {search_name} -> "Everything: Tìm File"
# {search_name} -> "Tìm File"
item_label_format = {search_name}

[defaults]
# Ép không cho hiện list rác khi chưa gõ chữ nào
allow_empty_search = no
# Tắt Regex mặc định để gõ chữ bình thường cho lẹ
is_regex = no

# ==========================================
# 🎯 TẠO CUSTOM SEARCH THEO Ý THÍCH
# ==========================================

[search/ev]
# %s: Là chuỗi sẽ gõ vào (VD: "đồ án")
# sort:run-count : Hàm của Everything, tự động ép kết quả hay mở nhất lên đầu
pattern = %s
description = Search a file/folder with Everything
allow_empty_search = no
is_regex = no

# 2. Search Nâng Cao (Chỉ tìm file Docs/PDF)
[search/tl]
# Áp dụng cú pháp gốc của Everything: đuôi file + từ khóa
pattern = *.doc|*.docx|*.pdf|*.txt %s
description = Chỉ lùng sục các file tài liệu học tập/làm việc
