[mgr]
show_hidden = true

[opener]
# edit = [
#     # [FIXED]: Thay '%s' bằng '"$@"' để shell hiểu đúng file name, support luôn mở nhiều file cùng lúc
#     { run = 'nvim "$@"', block = true, desc = "Mở bằng siêu rồng Neovim" }
# ]
edit = [
	{ run = "$EDITOR %s", block = true, for = "unix" },
	{ run = "%EDITOR% %s", block = true, for = "windows" },
]

[open]
rules = [
    { url = "*.{ts,tsx,toml,vue,svelte,lua}", use = "edit" },
    
    # Tự động hốt 90% các file text mới tạo, file code (.py, .js, .go, .rs) mà KHÔNG CẦN list đuôi
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "inode/x-empty", use = "edit" },

    # { mime = "image/*", use = "open_image" },
    # { mime = "video/*", use = "open_video" },

    { mime = "application/octet-stream", use = "edit" }, 
]

append_rules = [
	{ url = "*", use = "my-fallback" },
]
